name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: i18n lint (report-only)
        # Surfaces untranslated game-data literals and missing i18n keys.
        # Non-blocking for now — there is a known backlog of raw English
        # strings in src/data/**/*.json. Tighten to blocking once the
        # backlog is cleared. Report is uploaded as an artifact below
        # and the step's outcome is visible in the job summary.
        id: i18n_lint
        continue-on-error: true
        run: |
          mkdir -p i18n-lint-report
          node scripts/i18n-lint.mjs > i18n-lint-report/report.txt || true
          node scripts/i18n-lint.mjs --json > i18n-lint-report/report.json || true
          # Re-run once more so the step's exit code reflects the verdict.
          # continue-on-error: true keeps the job green either way.
          node scripts/i18n-lint.mjs --quiet

      - name: Upload i18n-lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-lint-report
          path: i18n-lint-report/
          retention-days: 14

      - name: Unit tests
        run: npm test -- --run --coverage

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
